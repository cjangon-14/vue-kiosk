<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="128" height="128" fill="#1e3a8a" rx="24"/>
  
  <!-- Kiosk/Screen shape -->
  <rect x="24" y="16" width="80" height="64" fill="#3b82f6" rx="8"/>
  
  <!-- Screen display inner -->
  <rect x="28" y="20" width="72" height="56" fill="#0f172a" rx="6"/>
  
  <!-- Dashboard grid lines -->
  <line x1="40" y1="32" x2="88" y2="32" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="48" x2="88" y2="48" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="64" x2="88" y2="64" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Stand -->
  <rect x="32" y="80" width="64" height="6" fill="#3b82f6" rx="3"/>
  <rect x="44" y="86" width="40" height="4" fill="#3b82f6" rx="2"/>
  
  <!-- Lock/Security indicator -->
  <g transform="translate(104, 28)">
    <circle cx="0" cy="0" r="8" fill="#10b981" opacity="0.8"/>
    <path d="M -2,-1 L 2,-1 L 2,0 L -2,0 Z" fill="#fff" stroke="#fff" stroke-width="0.5"/>
    <circle cx="0" cy="2" r="1.5" fill="#fff"/>
  </g>
</svg>
